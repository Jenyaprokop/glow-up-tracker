<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Glow Up">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0e1a">
<title>Glow Up Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0a0e1a;
    --bg2: #0f1525;
    --bg3: #141c30;
    --card: #161e33;
    --card2: #1a2340;
    --border: #1e2d4a;
    --border2: #243560;
    --blue: #3b82f6;
    --blue2: #2563eb;
    --blue-dim: #1d3a6e;
    --blue-glow: rgba(59,130,246,0.15);
    --text: #e8edf8;
    --text2: #8896b3;
    --text3: #4f627a;
    --green: #22c55e;
    --green-dim: #14532d;
    --white: #ffffff;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* SETUP SCREEN */
  #setup-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: var(--bg);
  }

  .setup-logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: 12px;
  }

  .setup-title {
    font-size: 32px;
    font-weight: 700;
    color: var(--white);
    text-align: center;
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .setup-sub {
    font-size: 15px;
    color: var(--text2);
    text-align: center;
    margin-bottom: 40px;
    line-height: 1.5;
  }

  .setup-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 420px;
  }

  .setup-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 10px;
    display: block;
  }

  .setup-input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 24px;
  }

  .setup-input:focus { border-color: var(--blue); }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-bottom: 24px;
  }

  .day-btn {
    aspect-ratio: 1;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--bg2);
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .day-btn.selected {
    background: var(--blue);
    border-color: var(--blue);
    color: var(--white);
  }

  .days-hint {
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 24px;
    margin-top: -18px;
    line-height: 1.4;
  }

  .setup-btn {
    width: 100%;
    background: var(--blue);
    color: var(--white);
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 14px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .setup-btn:hover { background: var(--blue2); }

  /* MAIN APP */
  #app-screen { display: none; min-height: 100vh; }

  .app-header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .header-brand {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--blue);
  }

  .header-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .reset-btn {
    font-size: 11px;
    color: var(--text3);
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  /* PROGRESS BAR */
  .progress-bar-block {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
  }

  .progress-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .progress-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
  }

  .progress-msg {
    font-size: 11px;
    color: var(--text2);
  }

  .progress-pct {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--blue);
  }

  .progress-bar-bg {
    width: 100%;
    height: 5px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--blue);
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 0 20px;
    z-index: 200;
  }

  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px 0;
    color: var(--text3);
    font-family: 'DM Sans', sans-serif;
    transition: color 0.15s;
  }

  .nav-btn.active { color: var(--blue); }
  .nav-icon { font-size: 20px; }
  .nav-label { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; }

  /* CALENDAR */
  .content { padding: 16px 20px 100px; }

  .day-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .day-card.today { border-color: var(--blue); }
  .day-card.complete { border-color: var(--green); }

  .day-card-header {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
  }

  .day-num {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    color: var(--text3);
    min-width: 32px;
  }

  .day-card.today .day-num { color: var(--blue); }
  .day-card.complete .day-num { color: var(--green); }

  .day-name-wrap { flex: 1; margin-left: 10px; }

  .day-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  .day-type { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .day-type.workout { color: var(--blue); }
  .day-type.abs { color: #a78bfa; }

  .day-dots { display: flex; gap: 4px; align-items: center; }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--border2);
    transition: background 0.2s;
  }

  .dot.checked { background: var(--green); }
  .dot.blue.checked { background: var(--blue); }
  .dot.purple.checked { background: #a78bfa; }

  .day-chevron {
    margin-left: 10px;
    color: var(--text3);
    font-size: 12px;
    transition: transform 0.2s;
  }

  .day-card.open .day-chevron { transform: rotate(180deg); }

  .day-tasks {
    display: none;
    padding: 0 16px 14px;
    border-top: 1px solid var(--border);
  }

  .day-card.open .day-tasks { display: block; }

  .task-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }

  .task-row:last-child { border-bottom: none; }

  .task-check {
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border2);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .task-row.done .task-check { background: var(--green); border-color: var(--green); }
  .task-row.done-blue .task-check { background: var(--blue); border-color: var(--blue); }
  .task-row.done-purple .task-check { background: #a78bfa; border-color: #a78bfa; }

  .check-icon {
    opacity: 0;
    color: white;
    font-size: 13px;
    font-weight: 700;
    transition: opacity 0.15s;
  }

  .task-row.done .check-icon,
  .task-row.done-blue .check-icon,
  .task-row.done-purple .check-icon { opacity: 1; }

  .task-label { flex: 1; }

  .task-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    transition: color 0.15s;
  }

  .task-row.done .task-name,
  .task-row.done-blue .task-name,
  .task-row.done-purple .task-name { color: var(--text2); }

  .task-desc { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .task-icon { font-size: 16px; flex-shrink: 0; width: 24px; text-align: center; }

  .today-badge {
    font-size: 10px; font-weight: 700;
    background: var(--blue); color: white;
    padding: 2px 6px; border-radius: 4px;
    margin-left: 6px; vertical-align: middle;
  }

  .today-scroll-btn {
    display: block; width: 100%;
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--blue);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600;
    padding: 10px; text-align: center;
    cursor: pointer; margin-bottom: 16px;
  }

  /* OVERVIEW */
  .motivational-banner {
    background: linear-gradient(135deg, var(--blue-dim), var(--card2));
    border: 1px solid var(--blue-dim);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
    text-align: center;
  }

  .motivational-banner .emoji { font-size: 24px; margin-bottom: 6px; }
  .motivational-banner .msg { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.4; }
  .motivational-banner .submsg { font-size: 12px; color: var(--text2); margin-top: 4px; }

  .section-divider {
    font-size: 11px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text3); margin: 20px 0 10px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }

  /* HEATMAP */
  .heatmap {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
  }

  .hm-day-label {
    font-size: 10px; color: var(--text3);
    text-align: center; font-weight: 600;
    padding-bottom: 4px;
  }

  .hm-cell {
    aspect-ratio: 1;
    border-radius: 5px;
    background: var(--border);
    transition: background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 600;
    color: transparent;
  }

  .hm-cell.future { background: var(--bg2); }
  .hm-cell.p25 { background: #1d3a6e; color: #3b82f6; }
  .hm-cell.p50 { background: #1e4d8c; color: #60a5fa; }
  .hm-cell.p75 { background: #1d4ed8; color: #bfdbfe; }
  .hm-cell.p100 { background: var(--green); color: white; }
  .hm-cell.today-hm { outline: 2px solid var(--blue); outline-offset: 1px; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup-screen">
  <div class="setup-logo">Glow Up Tracker</div>
  <div class="setup-title">Your 30-Day<br>Challenge Starts Now</div>
  <div class="setup-sub">30 days. One habit at a time.<br>Let's build something real.</div>

  <div class="setup-card">
    <label class="setup-label">Your First Name</label>
    <input type="text" class="setup-input" id="name-input" placeholder="Enter your name..." maxlength="20">

    <label class="setup-label">Your Workout Days <span style="color:var(--text3);font-weight:400;text-transform:none;letter-spacing:0">(pick 3)</span></label>
    <div class="days-grid" id="days-grid">
      <button class="day-btn" data-day="0">Mon</button>
      <button class="day-btn" data-day="1">Tue</button>
      <button class="day-btn" data-day="2">Wed</button>
      <button class="day-btn" data-day="3">Thu</button>
      <button class="day-btn" data-day="4">Fri</button>
      <button class="day-btn" data-day="5">Sat</button>
      <button class="day-btn" data-day="6">Sun</button>
    </div>
    <div class="days-hint">Abs training will be auto-assigned on 2 non-workout days each week.</div>

    <button class="setup-btn" id="start-btn">Start My 30-Day Challenge →</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app-screen">
  <div class="app-header">
    <div class="header-top">
      <div class="header-brand">Glow Up Tracker · 30 Days</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="header-name" id="header-name"></span>
        <button class="reset-btn" id="reset-btn">Reset</button>
      </div>
    </div>
    <div class="progress-bar-block">
      <div class="progress-top">
        <div>
          <div class="progress-label">Your Progress</div>
          <div class="progress-msg" id="progress-msg">Check off today's habits to begin</div>
        </div>
        <div class="progress-pct" id="progress-pct">0%</div>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-calendar" onclick="showView('calendar')">
      <span class="nav-icon">📅</span>
      <span class="nav-label">Calendar</span>
    </button>
    <button class="nav-btn" id="nav-overview" onclick="showView('overview')">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Overview</span>
    </button>
  </div>

  <!-- CALENDAR VIEW -->
  <div id="view-calendar" class="content">
    <button class="today-scroll-btn" onclick="scrollToToday()">↓ Jump to Today</button>
    <div id="calendar-content"></div>
  </div>

  <!-- OVERVIEW VIEW -->
  <div id="view-overview" class="content hidden">
    <div id="overview-content"></div>
  </div>
</div>

<script>
const STORAGE_KEY = 'glowup_30day_v2';
const TOTAL_DAYS = 30;

// Days per week repeat pattern: 0=Mon,1=Tue,2=Wed,3=Thu,4=Fri,5=Sat,6=Sun
const DAY_NAMES_SHORT = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DAY_NAMES_FULL  = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

const MOTIVATIONAL = [
  { emoji: '👊', msg: 'Let\'s get started.', sub: 'Your first perfect day is waiting.' },
  { emoji: '🔥', msg: 'You\'re on fire.', sub: 'Keep the momentum — don\'t break the chain.' },
  { emoji: '💪', msg: 'Consistency is your superpower.', sub: 'Most people quit. You didn\'t.' },
  { emoji: '⚡', msg: 'Every check is a vote for who you\'re becoming.', sub: 'Small actions, real results.' },
  { emoji: '🏆', msg: 'You\'re doing what you said you would.', sub: 'That\'s rarer than you think.' },
  { emoji: '🚀', msg: 'The body is built in everyday moments.', sub: 'Not just in the gym — right here.' },
  { emoji: '🎯', msg: 'Locked in.', sub: 'This is what discipline looks like in real life.' },
  { emoji: '💎', msg: 'You earned this.', sub: 'Now protect it.' },
  { emoji: '🌊', msg: 'Progress compounds.', sub: 'Every day you show up adds to the total.' },
];

const STREAK_MESSAGES = [
  [0,  'Check off today\'s habits to start your streak.'],
  [1,  'Day 1 done. The hardest streak to start is now started.'],
  [2,  'Back-to-back. You\'re building something.'],
  [3,  '3 days straight. This is becoming a habit.'],
  [5,  '5-day streak! You\'re in the top tier already.'],
  [7,  '1 full week! You actually did it. 🎉'],
  [10, '10 days in. This is who you are now.'],
  [14, '2 weeks straight. Incredible.'],
  [21, '21 days. Habits form here. You proved it.'],
  [30, '30/30. Perfect challenge. You are elite. 🏆'],
];

function getStreakMessage(streak) {
  let msg = STREAK_MESSAGES[0][1];
  for (const [k, m] of STREAK_MESSAGES) {
    if (streak >= k) msg = m;
  }
  return msg;
}

// ─── STATE ───────────────────────────────────────────────────────────
let state = null;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = JSON.parse(raw);
  } catch(e) { state = null; }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// workoutDays: array of 0-6 (0=Mon…6=Sun), repeating per week
function initState(name, workoutDays) {
  const days = {};
  for (let d = 1; d <= TOTAL_DAYS; d++) {
    // Day 1 = first day of challenge (treated as Monday internally)
    const dow = (d - 1) % 7; // 0=Mon,1=Tue,...6=Sun
    const isWorkout = workoutDays.includes(dow);
    days[d] = {
      mobility: false,
      steps: false,
      water: false,
      nutrition: false,
      workout: isWorkout ? false : null,
      abs: null,
    };
  }

  // Assign abs: 2x per 7-day cycle, on non-workout days
  for (let cycle = 0; cycle < Math.ceil(TOTAL_DAYS / 7); cycle++) {
    const start = cycle * 7 + 1;
    const end   = Math.min(start + 6, TOTAL_DAYS);
    const nonWorkout = [];
    for (let d = start; d <= end; d++) {
      const dow = (d - 1) % 7;
      if (!workoutDays.includes(dow)) nonWorkout.push(d);
    }
    nonWorkout.slice(0, 2).forEach(d => { days[d].abs = false; });
  }

  state = { name, workoutDays, days, startedAt: Date.now(), currentDay: 1 };
  saveState();
}

// "Today" = the current challenge day (1–30).
// We derive it from how many days have passed since startedAt.
function getTodayDayNum() {
  if (!state) return 1;
  const msPerDay = 86400000;
  const elapsed = Math.floor((Date.now() - state.startedAt) / msPerDay);
  return Math.min(Math.max(elapsed + 1, 1), TOTAL_DAYS);
}

// ─── SETUP ───────────────────────────────────────────────────────────
let selectedDays = [];

document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const day = parseInt(btn.dataset.day);
    if (selectedDays.includes(day)) {
      selectedDays = selectedDays.filter(d => d !== day);
      btn.classList.remove('selected');
    } else {
      if (selectedDays.length < 3) {
        selectedDays.push(day);
        btn.classList.add('selected');
      }
    }
  });
});

document.getElementById('start-btn').addEventListener('click', () => {
  const name = document.getElementById('name-input').value.trim();
  if (!name) { alert('Please enter your name!'); return; }
  if (selectedDays.length !== 3) { alert('Please select exactly 3 workout days!'); return; }
  initState(name, selectedDays);
  showApp();
});

document.getElementById('reset-btn').addEventListener('click', () => {
  if (confirm('Reset all progress and start the 30-day challenge over?')) {
    localStorage.removeItem(STORAGE_KEY);
    state = null;
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('setup-screen').style.display = 'flex';
    selectedDays = [];
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('name-input').value = '';
  }
});

// ─── VIEWS ───────────────────────────────────────────────────────────
function showView(view) {
  document.getElementById('view-calendar').classList.toggle('hidden', view !== 'calendar');
  document.getElementById('view-overview').classList.toggle('hidden', view !== 'overview');
  document.getElementById('nav-calendar').classList.toggle('active', view === 'calendar');
  document.getElementById('nav-overview').classList.toggle('active', view === 'overview');
  if (view === 'overview') renderOverview();
}

function showApp() {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  document.getElementById('header-name').textContent = state.name;
  renderCalendar();
  updateHeader();
  setTimeout(scrollToToday, 100);
}

// ─── CALENDAR ────────────────────────────────────────────────────────
function getDayTasks(dayNum) {
  const d = state.days[dayNum];
  const tasks = [
    { key: 'mobility',  icon: '🤸', name: 'Mobility Exercises', desc: '5–10 min movement flow',              color: 'green'  },
    { key: 'steps',     icon: '👟', name: '10,000 Steps',        desc: 'Daily movement goal',                 color: 'green'  },
    { key: 'water',     icon: '💧', name: 'Water Balance',       desc: '2–3 litres throughout the day',       color: 'green'  },
    { key: 'nutrition', icon: '🥗', name: 'Daily Nutrition',     desc: 'Hit your protein & calorie target',   color: 'green'  },
  ];
  if (d.workout !== null) tasks.push({ key: 'workout', icon: '💪', name: 'Full Workout Session', desc: 'Your scheduled training day', color: 'blue'   });
  if (d.abs     !== null) tasks.push({ key: 'abs',     icon: '🔥', name: 'Abs Training',         desc: '15–20 min core workout',     color: 'purple' });
  return tasks;
}

function getDayCompletionRatio(dayNum) {
  const tasks = getDayTasks(dayNum);
  const checked = tasks.filter(t => state.days[dayNum][t.key] === true).length;
  return { checked, total: tasks.length };
}

function getDayDots(dayNum) {
  return getDayTasks(dayNum).map(t => ({ checked: state.days[dayNum][t.key] === true, color: t.color }));
}

function getDayTypeLabel(dayNum) {
  const d = state.days[dayNum];
  if (d.workout !== null) return { text: '💪 Workout Day', cls: 'workout' };
  if (d.abs     !== null) return { text: '🔥 Abs Day',     cls: 'abs'     };
  return { text: 'Recovery & Habits', cls: '' };
}

function renderCalendar() {
  const todayNum = getTodayDayNum();
  const content  = document.getElementById('calendar-content');
  let html = '';

  for (let d = 1; d <= TOTAL_DAYS; d++) {
    const dow       = (d - 1) % 7;
    const isToday   = d === todayNum;
    const isPast    = d < todayNum;
    const { checked, total } = getDayCompletionRatio(d);
    const isComplete = checked === total;
    const typeLabel  = getDayTypeLabel(d);
    const dots       = getDayDots(d);

    let cardClass = 'day-card';
    if (isToday) cardClass += ' today';
    if (isComplete && (isToday || isPast)) cardClass += ' complete';

    html += `<div class="${cardClass}" id="day-${d}">
      <div class="day-card-header" onclick="toggleDay(${d})">
        <div class="day-num">${String(d).padStart(2,'0')}</div>
        <div class="day-name-wrap">
          <div class="day-name">${DAY_NAMES_FULL[dow]}${isToday ? '<span class="today-badge">TODAY</span>' : ''}</div>
          <div class="day-type ${typeLabel.cls}">${typeLabel.text}</div>
        </div>
        <div class="day-dots">
          ${dots.map(dot => `<div class="dot ${dot.color} ${dot.checked ? 'checked' : ''}"></div>`).join('')}
        </div>
        <div class="day-chevron">▼</div>
      </div>
      <div class="day-tasks" id="tasks-${d}">
        ${renderTasks(d)}
      </div>
    </div>`;
  }

  content.innerHTML = html;
}

function renderTasks(dayNum) {
  const tasks = getDayTasks(dayNum);
  const d = state.days[dayNum];
  return tasks.map(task => {
    const isDone = d[task.key] === true;
    const doneClass = isDone
      ? (task.color === 'blue' ? 'done-blue' : task.color === 'purple' ? 'done-purple' : 'done')
      : '';
    return `<div class="task-row ${doneClass}" onclick="toggleTask(${dayNum}, '${task.key}')">
      <div class="task-icon">${task.icon}</div>
      <div class="task-label">
        <div class="task-name">${task.name}</div>
        <div class="task-desc">${task.desc}</div>
      </div>
      <div class="task-check"><span class="check-icon">✓</span></div>
    </div>`;
  }).join('');
}

function toggleDay(dayNum) {
  document.getElementById(`day-${dayNum}`).classList.toggle('open');
}

function toggleTask(dayNum, key) {
  state.days[dayNum][key] = !state.days[dayNum][key];
  saveState();

  document.getElementById(`tasks-${dayNum}`).innerHTML = renderTasks(dayNum);

  const card  = document.getElementById(`day-${dayNum}`);
  const dots  = getDayDots(dayNum);
  card.querySelector('.day-dots').innerHTML =
    dots.map(dot => `<div class="dot ${dot.color} ${dot.checked ? 'checked' : ''}"></div>`).join('');

  const { checked, total } = getDayCompletionRatio(dayNum);
  const todayNum = getTodayDayNum();
  const isPast   = dayNum < todayNum;
  if (checked === total && (dayNum === todayNum || isPast)) card.classList.add('complete');
  else card.classList.remove('complete');

  updateHeader();
}

function scrollToToday() {
  const todayNum = getTodayDayNum();
  const el = document.getElementById(`day-${todayNum}`);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    if (!el.classList.contains('open')) el.classList.add('open');
  }
}

// ─── HEADER ──────────────────────────────────────────────────────────
function calculateStreak() {
  const todayNum = getTodayDayNum();
  let streak = 0;
  for (let d = todayNum; d >= 1; d--) {
    const { checked, total } = getDayCompletionRatio(d);
    if (checked === total && total > 0) streak++;
    else if (d === todayNum) break;
    else break;
  }
  return streak;
}

function calculateCompletedDays() {
  const todayNum = getTodayDayNum();
  let count = 0;
  for (let d = 1; d <= todayNum; d++) {
    const { checked, total } = getDayCompletionRatio(d);
    if (checked === total && total > 0) count++;
  }
  return count;
}

function updateHeader() {
  const streak    = calculateStreak();
  const completed = calculateCompletedDays();
  const pct       = Math.round((completed / TOTAL_DAYS) * 100);

  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent  = pct + '%';
  document.getElementById('progress-msg').textContent  = getStreakMessage(streak);
}

// ─── OVERVIEW ────────────────────────────────────────────────────────
function renderOverview() {
  const todayNum  = getTodayDayNum();
  const streak    = calculateStreak();
  const completed = calculateCompletedDays();

  const motIdx    = Math.min(Math.floor(streak / 3), MOTIVATIONAL.length - 1);
  const mot       = streak > 0 ? MOTIVATIONAL[motIdx] : MOTIVATIONAL[0];

  // Habit counts
  let mobilityCount=0, stepsCount=0, waterCount=0, nutritionCount=0, workoutCount=0, absCount=0;
  let workoutTotal=0,  absTotal=0;

  for (let d = 1; d <= todayNum; d++) {
    const day = state.days[d];
    if (day.mobility  === true) mobilityCount++;
    if (day.steps     === true) stepsCount++;
    if (day.water     === true) waterCount++;
    if (day.nutrition === true) nutritionCount++;
    if (day.workout !== null) { workoutTotal++; if (day.workout === true) workoutCount++; }
    if (day.abs     !== null) { absTotal++;     if (day.abs     === true) absCount++;     }
  }

  const html = `
    <div class="motivational-banner">
      <div class="emoji">${mot.emoji}</div>
      <div class="msg">${mot.msg}</div>
      <div class="submsg">${mot.sub}</div>
    </div>

    <div class="section-divider">30-Day Heatmap</div>
    <div class="stat-card" style="margin-bottom:16px;padding:16px">
      ${renderHeatmap(todayNum)}
    </div>

    <div class="section-divider">Habit Breakdown</div>
    <div class="stat-card" style="margin-bottom:10px">
      ${renderHabitRow('🤸', 'Mobility',     mobilityCount,  todayNum)}
      ${renderHabitRow('👟', 'Steps',        stepsCount,     todayNum)}
      ${renderHabitRow('💧', 'Water',        waterCount,     todayNum)}
      ${renderHabitRow('🥗', 'Nutrition',    nutritionCount, todayNum)}
      ${workoutTotal > 0 ? renderHabitRow('💪', 'Workouts',     workoutCount, workoutTotal) : ''}
      ${absTotal     > 0 ? renderHabitRow('🔥', 'Abs Sessions', absCount,     absTotal)     : ''}
    </div>
  `;

  document.getElementById('overview-content').innerHTML = html;
}

function renderHabitRow(icon, name, count, total) {
  const pct = total > 0 ? Math.round((count / total) * 100) : 0;
  return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
    <span style="font-size:16px;width:20px;text-align:center">${icon}</span>
    <span style="flex:1;font-size:13px;font-weight:500;color:var(--text)">${name}</span>
    <span style="font-family:'DM Mono',monospace;font-size:12px;color:var(--text2)">${count}/${total}</span>
    <div style="width:60px;height:4px;background:var(--border);border-radius:2px;overflow:hidden">
      <div style="width:${pct}%;height:100%;background:var(--blue);border-radius:2px"></div>
    </div>
  </div>`;
}

function renderHeatmap(todayNum) {
  // 30 cells in 5 rows of 6 — cleaner than calendar grid for a rolling tracker
  let html = `<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:6px;">`;
  for (let d = 1; d <= TOTAL_DAYS; d++) {
    const isToday  = d === todayNum;
    const isFuture = d > todayNum;
    let cls = 'hm-cell';
    if (isToday)  cls += ' today-hm';
    if (isFuture) {
      cls += ' future';
      html += `<div class="${cls}" style="font-size:9px;color:var(--text3);font-weight:600">${d}</div>`;
    } else {
      const { checked, total } = getDayCompletionRatio(d);
      const ratio = total > 0 ? checked / total : 0;
      if      (ratio === 0)  { /* grey default */ }
      else if (ratio <= 0.25) cls += ' p25';
      else if (ratio <= 0.5)  cls += ' p50';
      else if (ratio < 1)     cls += ' p75';
      else                    cls += ' p100';
      html += `<div class="${cls}" style="color:white;font-size:9px;font-weight:600">${d}</div>`;
    }
  }
  html += `</div>
  <div style="display:flex;gap:12px;margin-top:10px;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:3px;background:var(--border)"></div><span style="font-size:10px;color:var(--text3)">0%</span></div>
    <div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:3px;background:#1d3a6e"></div><span style="font-size:10px;color:var(--text3)">25%</span></div>
    <div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:3px;background:#1e4d8c"></div><span style="font-size:10px;color:var(--text3)">50%</span></div>
    <div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:3px;background:#1d4ed8"></div><span style="font-size:10px;color:var(--text3)">75%</span></div>
    <div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:3px;background:var(--green)"></div><span style="font-size:10px;color:var(--text3)">100%</span></div>
  </div>`;
  return html;
}

// ─── INIT ────────────────────────────────────────────────────────────
loadState();
if (state) {
  showApp();
} else {
  document.getElementById('setup-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
}
</script>
</body>
</html>
